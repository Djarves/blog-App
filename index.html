<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlogApp</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Приложение блог</h1>

    <div class="row">
        <div class="col">
             <h2>Новый пост</h2>

                <input 
                    class="js-post-title-input post-title-input" 
                    type="text"
                    placeholder="Заголовок">

                <textarea 
                    class="js-post-text-input post-text-input"
                    type="text"
                    placeholder="Tекст">
                </textarea>   

                <button class="js-new-post-btn new-post-btn">
                     Опубликовать
                </button>

                <div id="validationMessage" 
                     class="validationMessage validationMessage_hidden">
                </div>
        </div>
        <div class="col">
             <div class="posts-section">
                <h2>Лента</h2>

                <div class="js-posts posts">
                    Лента пуста...
                </div>

            </div>
        </div>
    </div>

  

   
    
    <script src="model.js"></script>
    <script src="view.js"></script>
    <script src="controller.js"></script>
    <script src="ind.js"></script>
</body>
</html>
